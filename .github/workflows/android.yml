name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (with LFS)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true                    # КРИТИЧНО!

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake wget unzip

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create local.properties
        run: |
          cat > local.properties << EOF
          telegram.api_id=8
          telegram.api_hash=7245de8e747a0d6fbe11f7cc14fcc0bb
          app.ntgcalls=true
          EOF

      - name: Run setup.sh
        env:
          TERM: xterm
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh || echo "Setup completed with warnings"

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx10g" \
            --parallel

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: '**/build/outputs/apk/**/*.apk'
